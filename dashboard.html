<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/form-input.css" />
    <link rel="stylesheet" href="css/colors.css" />
    <link rel="stylesheet" href="css/data-money.css" />
    <link rel="stylesheet" href="css/form-edit.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/hamburger.css" />
    <link rel="icon" href="data:," />
  </head>
  <body>
    <!--  -->

    <section class="sidebar">
      <div class="container-btn-logout">
        <button class="btn-logout">
          <span><img src="asset/icon/logout.svg" alt="logout" /></span>
          <span>Logout</span>
        </button>
      </div>
    </section>

    <!--  -->

    <main>
      <header class="header-user">
        <div>
          <div><img src="asset/icon/account.svg" alt="icon" /></div>
          <h1>Hello <span id="nameOwner"></span></h1>
        </div>
        <nav>
          <button class="btn-hamburger">
            <div class="hamburger-logo">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="close">
              <span></span>
              <span></span>
            </div>
          </button>
        </nav>
      </header>
      <section class="container-display-money">
        <div class="current-money">
          <h4>
            <span>Current Money</span>
            <span id="totalBalance"></span>
          </h4>
        </div>

        <div class="con-in-out-money">
          <div>
            <span class="icon green"
              ><img src="asset/icon/arrow-up.svg" alt="arrow-up"
            /></span>
            <span id="allIncomeMoney"></span>
          </div>
          <div>
            <span class="icon orange"
              ><img src="asset/icon/arrow-down.svg" alt="arrow-down"
            /></span>
            <span id="allExpenditureMoney"></span>
          </div>
        </div>
        <section><span class="blok"></span></section>
      </section>

      <section class="container-action">
        <!-- background -->
        <span class="jaieja">
          <span></span>
          <span></span>
        </span>

        <!-- konten -->
        <div class="container-konten">
          <span class="border-top"></span>

          <section class="btn-add-record">
            <button id="show-form">
              <span class="icon green"
                ><img src="asset/icon/add.svg" alt="icon-plus" /></span
              ><span>Add Record</span>
            </button>
          </section>

          <section class="container-form-input" style="display: none">
            <section class="btn-close-record">
              <button id="close-form">
                <span class="icon orange"
                  ><img src="asset/icon/close.svg" alt="icon-plus" /></span
                ><span>Close</span>
              </button>
            </section>
            <form id="formMoneyRecord" class="formMoneyRecord">
              <div>
                <label for="inputNominal">Masukan nominal</label>
                <input id="inputNominal" type="number" />
              </div>
              <div>
                <div class="container-input-radio">
                  <div class="akhiw">
                    <input
                      class="input-radio"
                      type="radio"
                      id="income"
                      name="type-money"
                      value="income"
                      checked
                    />
                    <label for="income">Income</label>
                  </div>

                  <div class="akhiw">
                    <input
                      class="input-radio"
                      type="radio"
                      id="expenditure"
                      name="type-money"
                      value="expenditure"
                    />
                    <label for="expenditure">expenditure</label>
                  </div>
                </div>
              </div>
              <div>
                <label for="descMoney">Masukan keterangan</label>
                <input id="descMoney" type="text" />
              </div>
              <div>
                <button id="submitMoneyRecord">
                  <span>Submit</span>
                  <span class="icon">
                    <img src="asset/icon/arrow-right.svg" alt="arrow-right" />
                  </span>
                </button>
              </div>
            </form>
          </section>

          <section class="container-lists">
            <div class="con-income">
              <h2 class="labelIncome">Pemasukan</h2>
              <ul id="list-desc-money" class="containerList"></ul>
            </div>
            <div class="con-expenditure">
              <h2 class="expendLabel">Pengeluaran</h2>
              <ul
                id="list-desc-money-expenditure"
                class="containerListExpenditure"
              ></ul>
            </div>
          </section>
        </div>
      </section>

      <!-- container form edit -->
      <section style="display: none" class="containerFormEdit">
        <div>
          <button class="editClose">
            <div class="orange">
              <img src="asset/icon/close.svg" alt="close-icon" />
            </div>
            <span>Close</span>
          </button>
        </div>
        <form name="formEdit">
          <div>
            <label for="newNominal">Masukan nominal</label>
            <input id="newNominal" class="newNominal" type="number" min="0" />
          </div>
          <div class="container-input-radio">
            <div class="akhiw">
              <input
                class="input-radio"
                type="radio"
                id="incomeEdit"
                name="edit-type"
                value="income"
                checked
              />
              <label for="incomeEdit">Income</label>
            </div>

            <div class="akhiw">
              <input
                class="input-radio"
                type="radio"
                id="expenditureEdit"
                name="edit-type"
                value="expenditure"
              />
              <label for="expenditureEdit">expenditure</label>
            </div>
          </div>
          <div>
            <label for="newDesc">Masukan Keterangan</label>
            <input id="newDesc" class="newDesc" type="text" />
          </div>
          <div>
            <button class="btnEdit">
              <div class="green"><img src="asset/icon/save.svg" alt="" /></div>
              <span>SAVE</span>
            </button>
          </div>
        </form>
      </section>
    </main>
    <!--  -->
    <script type="module" src="javascript/logout.js"></script>
    <script type="module" src="server/edit.js"></script>
    <script type="module" src="javascript/dashboard.js"></script>
    <script type="module" src="server/server.js"></script>
    <script type="module" src="javascript/hamburger.js"></script>
    <script type="moduel" src="bluePrint/class.js"></script>
  </body>
</html>
